<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PressPlay — Панель</title>
  <link rel="stylesheet" href="/static/css/dashboard.css?v={{ v }}">
</head>
<body>
  <div class="layout">

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">PP</div>
        <div class="brand-name">PressPlay.kz</div>
      </div>

      <nav class="nav">
        <a class="nav-item" data-route="home">
          <span class="nav-ico">🏠</span> Главная
        </a>

        <div class="nav-group">
          <div class="nav-group-title">Поставщики</div>
          <div id="nav-suppliers"></div>
        </div>

        <div class="nav-group">
          <div class="nav-group-title">XML-фиды</div>
          <div id="nav-feeds"></div>
        </div>

        <a class="nav-item" data-route="settings">
          <span class="nav-ico">⚙️</span> Настройки
        </a>
        <a class="nav-item" data-route="blacklist">
          <span class="nav-ico">🚫</span> Чёрный список
        </a>
      </nav>

      <div class="sidebar-foot">
        <a class="nav-item" href="#" onclick="logout();return false;">
          <span class="nav-ico">↪</span> Выйти
        </a>
      </div>
    </aside>

    <main class="main">
      <div class="crumbs" id="crumbs"></div>
      <div id="view"></div>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <div id="modal" class="modal"><div class="modal-body" id="modal-body"></div></div>

  <script src="/static/js/dashboard.js?v={{ v }}"></script>
</body>
</html>
