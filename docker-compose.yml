services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Asia/Almaty
    volumes:
      - appdata:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 128M

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    environment:
      DOZZLE_BASE: /logs
      DOZZLE_USERNAME: ${DOZZLE_USER:-admin}
      DOZZLE_PASSWORD: ${DOZZLE_PASSWORD:-changeme}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 64M

  backup:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      - TZ=Asia/Almaty
    volumes:
      - appdata:/data:ro
      - backups:/backups
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache sqlite tzdata >/dev/null && exec /scripts/backup-entrypoint.sh"]
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  appdata:
  caddy_data:
  caddy_config:
  backups:
